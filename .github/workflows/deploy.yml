name: Build check (CI)
# Ce site est hébergé sur O2Switch (PHP requis) — déploiement via deploy.bat (FTP/WinSCP)
# GitHub Pages ne supporte pas PHP : ce workflow vérifie uniquement que le build Astro passe.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Astro (vérification CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
