; OceanPhenix TourData 2026 — Config PHP O2Switch (FastCGI/CGI)
; Ce fichier est lu par PHP-FPM / CGI sur O2Switch mutualisé.
; Les directives ici s'appliquent uniquement à ce répertoire et ses sous-dossiers.

; ── Timeouts ────────────────────────────────────────────────────────────────
; Augmenté pour les appels API Overpass (pouvant prendre 20-25s)
max_execution_time = 60
max_input_time = 30
default_socket_timeout = 30

; ── Upload / mémoire ────────────────────────────────────────────────────────
memory_limit = 64M
post_max_size = 2M
upload_max_filesize = 2M
